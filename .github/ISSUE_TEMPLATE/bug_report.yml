name: Bug report
description: Something in a malloc product isn't working as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in the details below so it's reproducible.
  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - lilEasyFace
        - MocapSeitai
        - Easy MC2 Helper
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Product version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: liltoon
    attributes:
      label: lilToon version (for lilEasyFace bugs)
      placeholder: e.g. 2.3.4
    validations:
      required: false
  - type: input
    id: magicacloth
    attributes:
      label: MagicaCloth 2 version (for Easy MC2 Helper bugs)
      placeholder: e.g. 2.14.0
    validations:
      required: false
  - type: input
    id: unity
    attributes:
      label: Unity version
      placeholder: e.g. 2022.3.22f1
    validations:
      required: true
  - type: dropdown
    id: pipeline
    attributes:
      label: Render pipeline
      options:
        - Built-in RP
        - URP
        - HDRP
        - Not sure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead? Screenshots help a lot.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false
