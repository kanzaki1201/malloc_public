name: Feature request
description: Suggest an idea or improvement for a malloc product.
labels: [enhancement]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - lilEasyFace
        - MocapSeitai
        - Easy MC2 Helper
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Describe the feature
    validations:
      required: true
